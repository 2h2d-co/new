[settings]
lockfile = true
locked = true
minimum_release_age = "7d"

[tools]
hk = { version = "1.50.0", postinstall = "hk install --mise" }
cocogitto = "7.0.0"
node = "22"
npm = "11"
actionlint = "1.7.12"
zizmor = "1.26.1"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[shell_alias]
"new:local" = "node {{config_root}}/src/cli.ts"
